# Render Blueprint — deploy the API + a free Postgres in one click.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: receipts-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: Jwt__Key
        generateValue: true          # Render generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: receipts-db
          property: connectionString

databases:
  - name: receipts-db
    plan: free
