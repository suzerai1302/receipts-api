name: Keepalive

# Pings the live API so Render's free tier doesn't spin the service down
# (it sleeps after ~15 min idle, adding a ~50s cold start to the next request).
# Note: GitHub disables scheduled workflows after 60 days of repo inactivity.

on:
  schedule:
    - cron: "*/12 * * * *"   # every 12 minutes (UTC)
  workflow_dispatch: {}        # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl /health
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 90 \
            https://receipts-api-2hyk.onrender.com/health)
          echo "health -> $code"
          test "$code" = "200"
